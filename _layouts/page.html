---
layout: default
---
<h1>{{ page.headline | default: page.title }}</h1>

<div class="page-layout">
  <main class="main-content">
    
    <div class="filter-controls">
      <div class="control-row-tags">
        <span class="filter-label">Filter by path:</span>
        <div class="tag-filters-container" id="tagFiltersContainer">
          <button type="button" class="tag-btn active" data-value="all">All paths</button>
          <button type="button" class="tag-btn" data-value="researcher">Researcher</button>
          <button type="button" class="tag-btn" data-value="manager">Manager</button>
          <button type="button" class="tag-btn" data-value="trainer">Trainer</button>
        </div>
      </div>
      
      <div class="control-row">
        <label for="searchInput">Search text:</label>
        <div style="display: flex; gap: 8px; width: 100%; max-width: 400px;">
          <input type="text" id="searchInput" placeholder="Type keywords to filter articles..." style="max-width: none; flex-grow: 1;">
          <button type="button" id="resetSearchBtn" class="tag-btn invisible" style="border-radius: 4px; padding: 8px 16px; transition: opacity 0.2s ease;">Reset</button>
        </div>
      </div>
    </div>

    <div class="docs-container" id="docsContainer">
      <!-- Looper gjennom alle innlegg i _posts mappen -->
      {% for post in site.posts %}
        <!-- Gjør taggen om til små bokstaver og fjerner mellomrom for sikker matching -->
        {% assign tag_slug = post.tags | first | slugify | remove: "-" %}
        
        <article class="filterable" data-tags="{{ tag_slug }}">
          <div class="tag-container">
            <span class="tag tag-{{ tag_slug }}">{{ post.tags | first }}</span>
          </div>
          <h2>{{ post.title }}</h2>
          {{ post.content }}
        </article>
      {% endfor %}
      
      <!-- Viser innholdet fra selve index.md om du skulle skrive noe der -->
      {{ content }}
    </div>

  </main>
</div>

<script src="{{ '/assets/js/filter.js' | relative_url }}"></script>
